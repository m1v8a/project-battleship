<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battleship</title>
</head>

<body>
  <header>
    <h1>Battleship</h1>
  </header>
  <main>
    <section id="game-screen">
      <div id="player-container">
        <div class="score">
          <p>Player</p>
          <p>Hits: <span class="hits">0</span></p>
          <p>Misses: <span class="misses">0</span></p>
        </div>
        <div class="board"></div>
      </div>
      <div id="computer-container">
        <div class="score">
          <p>Computer</p>
          <p>Hits: <span class="hits">0</span></p>
          <p>Misses: <span class="misses">0</span></p>
        </div>
        <div class="board"></div>
      </div>
    </section>
  </main>
</body>

</html>
